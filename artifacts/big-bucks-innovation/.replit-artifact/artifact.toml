kind = "web"
previewPath = "/"
title = "Big Bucks Innovation"
version = "1.0.0"
id = "artifacts/big-bucks-innovation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22671

[services.development]
run = "pnpm --filter @workspace/big-bucks-innovation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/big-bucks-innovation", "run", "build" ]
publicDir = "artifacts/big-bucks-innovation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22671"
BASE_PATH = "/"
